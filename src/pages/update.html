<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flying Lyrics Updated!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: #0e0e0e;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(29, 185, 84, 0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(29, 185, 84, 0.05) 0%, transparent 60%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            padding: 44px 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
        }

        /* ── Logo ── */
        .logo-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 84px;
            height: 84px;
            margin-bottom: 22px;
            animation: float 3.5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-8px); }
        }

        /* ── Headings ── */
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1DB954;
            letter-spacing: -0.3px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #777;
            margin-bottom: 28px;
        }

        /* ── Highlight box ── */
        .highlight {
            background: rgba(29, 185, 84, 0.06);
            border-left: 3px solid #1DB954;
            border-radius: 0 10px 10px 0;
            padding: 14px 16px;
            text-align: left;
            margin-bottom: 28px;
            font-size: 14px;
            line-height: 1.65;
            color: #ccc;
        }

        .highlight strong {
            color: #fff;
        }

        /* ── Primary CTA ── */
        .btn-review {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px 20px;
            background: #1DB954;
            color: #000;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 6px 20px rgba(29, 185, 84, 0.35);
            margin-bottom: 14px;
        }

        .btn-review:hover {
            background: #1ed760;
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(29, 185, 84, 0.45);
        }

        .btn-review:active {
            transform: scale(0.98);
        }

        /* ── Secondary actions grid ── */
        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 22px;
        }

        .btn-secondary {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 14px 12px;
            background: #242424;
            border: 1px solid #333;
            border-radius: 14px;
            color: #ccc;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
        }

        .btn-secondary svg {
            opacity: 0.75;
            transition: opacity 0.18s;
        }

        .btn-secondary:hover {
            background: #2c2c2c;
            border-color: #1DB954;
            color: #fff;
        }

        .btn-secondary:hover svg {
            opacity: 1;
        }

        /* ── Dismiss ── */
        .btn-dismiss {
            background: none;
            border: none;
            color: #555;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.15s;
        }

        .btn-dismiss:hover {
            color: #888;
        }
    </style>
</head>

<body>
    <div class="card">

        <!-- Logo -->
        <div class="logo-wrap">
            <img src="../../assets/icons/icon.png" width="76" height="76" alt="Flying Lyrics logo" style="border-radius: 16px; box-shadow: 0 6px 16px rgba(0,0,0,0.4);">
        </div>

        <h1>Flying Lyrics Updated! 🎉</h1>
        <p class="subtitle">Your extension is now running the latest version.</p>

        <div class="highlight">
            <strong>Flying Lyrics is a solo project.</strong>
            If this extension helps you sing along to your favorite tracks, please consider leaving a
            5&#8209;star rating on the Web Store &mdash; it keeps the project alive and growing! 🙏
        </div>

        <!-- Primary CTA: dynamically set by update.js -->
        <button id="btn-review" class="btn-review">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
            Rate on the Web Store
        </button>

        <!-- Secondary actions -->
        <div class="actions-grid">
            <!-- GitHub changelog -->
            <a id="btn-changelog" href="https://github.com/Crlyzd/flying-lyrics/releases/latest"
               target="_blank" class="btn-secondary">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
                </svg>
                What's New
            </a>

            <!-- Bug / Feature form -->
            <a href="https://forms.gle/qdyBFtmeomtGBroXA" target="_blank" class="btn-secondary">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                Report Bug
            </a>
        </div>

        <button id="btn-dismiss" class="btn-dismiss">
            No thanks, take me back to listening 🎵
        </button>

    </div>

    <script src="update.js"></script>
</body>

</html>
